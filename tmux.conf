# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#latest'

# Basics
set -g extended-keys on
set -g extended-keys-format csi-u
set -gq allow-passthrough on
set -g visual-activity off
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -s copy-command '~/.config/tmux/scripts/tmux-copy'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_modules_right 'session date_time'
set -g @catppuccin_date_time_text '%H:%M'

# Windows
bind w display-popup -E -w 80% -h 70% '~/.config/tmux/scripts/tmux-window-picker'
bind a display-popup -E -w 80% -h 70% '~/.config/tmux/scripts/tmux-action-picker'
bind -r h previous-window
bind -r l next-window
bind n new-window
bind x kill-window

# Panes, kept on uppercase keys so h/l stay focused on windows.
bind -r H select-pane -L
bind -r J select-pane -D
bind -r K select-pane -U
bind -r L select-pane -R

# Copy mode and search
setw -g mode-keys vi
bind v copy-mode
bind / copy-mode \; send-keys /
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Sessions with sesh + fzf
bind q detach-client
bind Q confirm-before -p 'Kill session #S? (y/n)' kill-session
bind s display-popup -E -w 90% -h 80% '~/.config/tmux/scripts/tmux-session-picker tmux'
bind S display-popup -E -w 90% -h 80% '~/.config/tmux/scripts/tmux-session-picker tmux'
bind C-l run-shell 'sesh last'

# Initialize TMUX plugin manager before applying the custom status bar.
run '~/.config/tmux/plugins/tpm/tpm'

# Custom Catppuccin status bar
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style 'bg=default,fg=#cdd6f4'
set -g status-left-length 80
set -g status-right-length 120
set -g status-left ' #[fg=#f38ba8,bg=default]#[fg=#1e1e2e,bg=#f38ba8,bold] 󰆍 #[fg=#cdd6f4,bg=#45475a,bold]  #S  #[fg=#45475a,bg=default]  '
set -g status-right '#(~/.config/tmux/scripts/tmux-git-branch "#{pane_current_path}")#[fg=#fab387,bg=default]#[fg=#1e1e2e,bg=#fab387,bold]  %H:%M  #[fg=#fab387,bg=default] '
setw -g window-status-separator '  '
setw -g window-status-format '#[fg=#45475a,bg=default]#[fg=#bac2de,bg=#45475a]  #W  #[fg=#89b4fa,bg=#45475a]#[fg=#1e1e2e,bg=#89b4fa,bold] #I #[fg=#89b4fa,bg=default]'
setw -g window-status-current-format '#[fg=#45475a,bg=default]#[fg=#cdd6f4,bg=#45475a,bold]  #W  #[fg=#fab387,bg=#45475a]#[fg=#1e1e2e,bg=#fab387,bold] #I #[fg=#fab387,bg=default]'
set -g message-style 'bg=#313244,fg=#cdd6f4'
set -g mode-style 'bg=#fab387,fg=#1e1e2e'
